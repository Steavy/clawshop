services:
   
  webshop:
    image: node:22-alpine
    container_name: webshop
    networks:
      - webshop-net
    ports:
      - "5000:5000"
    working_dir: /app
    command: >
      sh -c "npm install && node server.js"
    volumes:
      - ./website:/app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/api/products"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  webshop-net:
    name: webshop-net      
