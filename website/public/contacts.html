<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <title>📬 Contacten — ClawShop</title>
</head>
<body class="contacten-page">

  <!-- Header -->
  <header>
    <h1>🛒 <span>Claw</span>Shop</h1>
    <nav>
      <a href="/" class="nav-btn">🏠 Webshop</a>
      <a href="/contacts.html" class="nav-btn active">📬 Contacten</a>
    </nav>
  </header>

  <div class="container" style="padding: 2rem;">
    <div class="contacten-header">
      <h1>📬 Contacten</h1>
      <p>Alle berichten via het contactformulier</p>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="number" id="total-count">0</div>
        <div class="label">Totaal berichten</div>
      </div>
      <div class="stat-card">
        <div class="number" id="today-count">0</div>
        <div class="label">Vandaag</div>
      </div>
    </div>

    <input type="text" class="search-box" id="search" placeholder="🔍 Zoek op naam, e-mail of onderwerp...">

    <div class="contact-list" id="contact-list">
      <div class="empty-state">
        <div class="icon">⏳</div>
        <p>Berichten laden...</p>
      </div>
    </div>
  </div>

  <script>
    let contacts = [];

    async function loadContacts() {
      try {
        const res = await fetch('http://localhost:5000/api/contacts/json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        contacts = await res.json();
        renderContacts(contacts);
        updateStats(contacts);
      } catch (err) {
        console.error('Fout bij laden contacten:', err);
        document.getElementById('contact-list').innerHTML =
          '<div class="empty-state"><div class="icon">⚠️</div><p>Fout bij laden. <button onclick="loadContacts()" style="background:none;border:none;color:#3498db;text-decoration:underline;cursor:pointer;">Opnieuw proberen</button></p></div>';
      }
    }

    function renderContacts(list) {
      const container = document.getElementById('contact-list');
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Geen berichten gevonden</p></div>';
        return;
      }
      container.innerHTML = list.map(function(c) {
        return '<div class="contact-card">' +
          '<div class="contact-header">' +
            '<span class="contact-name">' + escapeHtml(c.name) + '</span>' +
            '<span class="contact-date">' + formatDate(c.date) + '</span>' +
          '</div>' +
          '<div class="contact-email">📧 ' + escapeHtml(c.email) + '</div>' +
          '<div class="contact-subject">' + escapeHtml(c.subject) + '</div>' +
          '<div class="contact-message">' + escapeHtml(c.message) + '</div>' +
        '</div>';
      }).join('');
    }

    function updateStats(list) {
      document.getElementById('total-count').textContent = list.length;
      var today = new Date().toISOString().slice(0, 10);
      var todayCount = list.filter(function(c) { return c.date.startsWith(today); }).length;
      document.getElementById('today-count').textContent = todayCount;
    }

    function formatDate(iso) {
      var d = new Date(iso);
      var now = new Date();
      var diff = (now - d) / 1000;
      if (diff < 60) return 'Zojuist';
      if (diff < 3600) return Math.floor(diff / 60) + ' min geleden';
      if (diff < 86400) return Math.floor(diff / 3600) + ' uur geleden';
      return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    document.getElementById('search').addEventListener('input', function(e) {
      var q = e.target.value.toLowerCase();
      if (!q) return renderContacts(contacts);
      var filtered = contacts.filter(function(c) {
        return c.name.toLowerCase().includes(q) ||
               c.email.toLowerCase().includes(q) ||
               c.subject.toLowerCase().includes(q) ||
               c.message.toLowerCase().includes(q);
      });
      renderContacts(filtered);
    });

    loadContacts();
    setInterval(loadContacts, 30000);
  </script>
</body>
</html>
